syntax = "proto3";
package adp.core.v1;

import "google/protobuf/timestamp.proto";

// Records the assignment of a task to an agent.
message Delegation {
  string id = 1;                    // ULID
  string task_id = 2;
  string agent_id = 3;
  DelegationState state = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

enum DelegationState {
  DELEGATION_STATE_UNSPECIFIED = 0;
  DELEGATION_STATE_ASSIGNED = 1;
  DELEGATION_STATE_ACCEPTED = 2;
  DELEGATION_STATE_REJECTED = 3;
  DELEGATION_STATE_COMPLETED = 4;
  DELEGATION_STATE_FAILED = 5;
}
